              <section class="home">

                        </div>
                        <div class="item1">

                                <p id="day-date">number</p>
                            </div>
                            <div class="todaydital">
                                <h2 id='city'class="city">cairo</h2>

                                    <h1 id="degree">35<sup> ْ </sup>C</h1>

                                   </div> 

                                   <img id="todayicon" src="images/113.png" alt="">

                                <p id="status" class="stuts">suuny</p>

                                    <img src="images/icon-umberella@2x.png" alt="">

                                    <img src="images/icon-wind@2x.png" alt="">
                                    <p id="wind">11</p>
                                    <img src="images/icon-compass@2x.png" alt="">
                                    <p id='compass'>11</p>

                            </div>
                            </div>
                           

                        </div>

                             </div>

                                 <p id="mindegree" class="min m-3">55</p>
                                 <p id="tomstatus" class="stuts m-3">sunny</p>
                             </div>
                           </div>

                                 <p  id="minnextday"class="min m-3">55</p>
                                 <p id='statusnextday'class="stuts m-3">sunny</p>

                           </div>
                   
                       <div class="clr">
